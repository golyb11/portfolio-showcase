{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="csrf-token" content="{{ csrf_token }}" />
  <title>Sign in — Portfolio</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}" />
  <link rel="stylesheet" href="{% static 'css/components.css' %}" />
  <link rel="stylesheet" href="{% static 'css/auth.css' %}" />
</head>
<body class="auth-page">
  <svg xmlns="http://www.w3.org/2000/svg" style="display:none">
    <symbol id="icon-layers" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="12 2 2 7 12 12 22 7 12 2"/>
      <polyline points="2 17 12 22 22 17"/>
      <polyline points="2 12 12 17 22 12"/>
    </symbol>
  </svg>

  <main class="auth-card" role="main">
    <div class="auth-card__brand">
      <span class="auth-card__brand-icon" aria-hidden="true">
        <svg class="icon" width="28" height="28"><use href="#icon-layers"></use></svg>
      </span>
      <h1 class="auth-card__title">Portfolio</h1>
    </div>
    <p class="auth-card__subtitle">Sign in to your account</p>

    <form class="auth-card__form" id="loginForm" novalidate autocomplete="on">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input
          type="email"
          id="email"
          name="email"
          class="input"
          placeholder="alice@portfolio.dev"
          autocomplete="email"
          required
        />
        <div class="auth-error" id="emailError" aria-live="polite"></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          class="input"
          placeholder="Demo@Password123!"
          autocomplete="current-password"
          required
        />
        <div class="auth-error" id="passwordError" aria-live="polite"></div>
      </div>

      <button type="submit" class="btn btn--primary auth-card__submit" id="loginBtn">
        Sign in
      </button>

      <div class="auth-card__demo">
        <strong>Demo credentials:</strong>
        <code>alice@portfolio.dev</code><br />
        <code>Demo@Password123!</code>
      </div>
    </form>
  </main>

  <script src="{% static 'js/auth/login.js' %}"></script>
</body>
</html>
